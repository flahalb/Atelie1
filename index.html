<html>
 <head>
  <title>Primeira experiência de RA usando Hiro e A-frame</title>
   <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
   <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

 </head>
  <body style="margin: 0 px; overflow: hidden">
    <a-scene vr-mode-ui="enabled: false" embedded arjs="debugUIEnabled: false">
      <a-marker present="hiro">
       <a-image src="Screenshot.gif" position="0 0.5 0" rotation="-90 0 0" width="2" height="1.5"></a-image> 
      </a-marker>
      <a-entity camera></a-entity>
      
    </a-scene>
  </body>
  
</html>
